# Nginx reverse proxy for Zen.
# The web container terminates all traffic; it internally proxies /api to the
# backend, so Nginx only needs to forward to zen-web.

server {
    listen 80;
    server_name zen.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name zen.example.com;

    ssl_certificate     /etc/ssl/certs/zen.example.com.crt;
    ssl_certificate_key /etc/ssl/private/zen.example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 64m;          # plugin uploads

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;        # slow AI responses
    }
}

# Remember to set ZEN_TRUSTED_PROXIES to this proxy's IP so the backend
# honors X-Forwarded-For, and ZEN_BASE_URL=https://zen.example.com.
