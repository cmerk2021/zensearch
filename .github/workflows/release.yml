name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BACKEND=$(grep -oP '__version__ = "\K[^"]+' backend/zen/version.py)
          FRONTEND=$(grep -oP '"version": "\K[^"]+' frontend/package.json | head -1)
          echo "tag=$TAG backend=$BACKEND frontend=$FRONTEND"
          [ "$TAG" = "$BACKEND" ] || { echo "backend version mismatch"; exit 1; }
          [ "$TAG" = "$FRONTEND" ] || { echo "frontend version mismatch"; exit 1; }

  test:
    name: Full test suite
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - working-directory: backend
        run: |
          pip install -e ".[dev]"
          pytest -q

  images:
    name: Build & push multi-arch images
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: zen-server
            dockerfile: deploy/docker/Dockerfile.backend
          - image: zen-web
            dockerfile: deploy/docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  github-release:
    name: Create GitHub release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog section
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          {
            echo "## Changes"
            echo ""
            if [ -n "$PREV" ]; then
              git log --pretty='- %s (%h)' "$PREV..${GITHUB_REF_NAME}"
            else
              git log --pretty='- %s (%h)'
            fi
            echo ""
            echo "## Images"
            echo '- `ghcr.io/${{ github.repository_owner }}/zen-server:'"${GITHUB_REF_NAME#v}"'`'
            echo '- `ghcr.io/${{ github.repository_owner }}/zen-web:'"${GITHUB_REF_NAME#v}"'`'
          } > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
