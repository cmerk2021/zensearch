name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check zen tests

      - name: Tests with coverage
        working-directory: backend
        run: pytest --cov=zen --cov-report=xml --cov-fail-under=70 -q

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  backend-postgres:
    name: Backend (PostgreSQL integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zen_test
          POSTGRES_USER: zen
          POSTGRES_PASSWORD: zen_test_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U zen" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev,postgres]"
      - name: Apply migrations against PostgreSQL
        working-directory: backend
        env:
          ZEN_ENV: test
          ZEN_SECRET_KEY: ci-migration-secret-key-0123456789abcdef
          ZEN_DATABASE_URL: postgresql+asyncpg://zen:zen_test_pw@localhost:5432/zen_test
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.backend
          push: false
          cache-from: type=gha,scope=ci-zen-server
          cache-to: type=gha,mode=max,scope=ci-zen-server
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: false
          cache-from: type=gha,scope=ci-zen-web
          cache-to: type=gha,mode=max,scope=ci-zen-web
